<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="900" y2="980" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4f7cff"/>
      <stop offset="0.55" stop-color="#6d5cff"/>
      <stop offset="1" stop-color="#9b3cf0"/>
    </linearGradient>
    <linearGradient id="arrow" x1="512" y1="250" x2="512" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef0ff"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#1a1240" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- rounded-square base -->
  <rect x="64" y="64" width="896" height="896" rx="220" fill="url(#bg)"/>
  <!-- top sheen -->
  <rect x="64" y="64" width="896" height="448" rx="220" fill="#ffffff" opacity="0.08"/>

  <g filter="url(#soft)">
    <!-- open box: back flaps -->
    <path d="M512 506 L338 596 L512 596 Z" fill="#c9d0ff"/>
    <path d="M512 506 L686 596 L512 596 Z" fill="#aeb8ff"/>
    <!-- box body -->
    <rect x="330" y="592" width="364" height="208" rx="34" fill="#e9ecff"/>
    <!-- app dots on the box (apps inside the store) -->
    <g fill="#6d5cff">
      <rect x="398" y="690" width="58" height="58" rx="16"/>
      <rect x="484" y="690" width="58" height="58" rx="16"/>
      <rect x="570" y="690" width="58" height="58" rx="16"/>
    </g>
    <!-- upward arrow (an app being opened / fetched) -->
    <g fill="url(#arrow)">
      <rect x="474" y="356" width="76" height="248" rx="22"/>
      <path d="M512 268 L626 396 L398 396 Z"/>
    </g>
  </g>
</svg>
