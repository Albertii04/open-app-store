appId: com.openappstore.app
productName: Open App Store
# Publish to GitHub Releases so electron-builder emits the auto-update metadata
# (latest*.yml) electron-updater reads. The release workflow runs with
# --publish always + GH_TOKEN.
publish:
  provider: github
  owner: Albertii04
  repo: open-app-store
  releaseType: release
directories:
  output: release
  buildResources: build
files:
  - out/**
# Builtin tools ship as resources/tools/<id>/ (built dist + manifest + icon).
extraResources:
  - from: ../tools
    to: tools
    filter:
      - '**/toolbox.json'
      - '**/icon.svg'
      - '**/dist/**'
mac:
  target:
    - dmg
    - zip
  category: public.app-category.productivity
  # macOS only applies SIGNED + NOTARIZED auto-updates. Sign with the Developer
  # ID (CSC_LINK/CSC_KEY_PASSWORD) and notarize (APPLE_ID/APPLE_APP_SPECIFIC_
  # PASSWORD/APPLE_TEAM_ID) — all provided as env in the release workflow.
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Notarization is OFF: the current signing cert is "Apple Development", which
  # notarytool rejects ("not signed with a valid Developer ID certificate").
  # To enable, create a "Developer ID Application" cert in the Apple Developer
  # portal, export it as a .p12, and update the MAC_CSC_LINK secret — then set:
  #   notarize: { teamId: 7ULADLL579 }
  # The release workflow already passes APPLE_ID/APPLE_APP_SPECIFIC_PASSWORD.
  # Until then the build signs only (auto-update applies; Gatekeeper warns on
  # first install).
  notarize: false
win:
  target:
    - nsis
linux:
  target:
    - AppImage
  category: Utility
