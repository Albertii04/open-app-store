appId: com.openappstore.app
productName: Open App Store
# Publish to GitHub Releases so electron-builder emits the auto-update metadata
# (latest*.yml) electron-updater reads. The release workflow runs with
# --publish always + GH_TOKEN.
publish:
  provider: github
  owner: Albertii04
  repo: open-app-store
  releaseType: release
directories:
  output: release
  buildResources: build
files:
  - out/**
# Builtin tools ship as resources/tools/<id>/ (built dist + manifest + icon).
extraResources:
  - from: ../tools
    to: tools
    filter:
      - '**/toolbox.json'
      - '**/icon.svg'
      - '**/dist/**'
mac:
  target:
    - dmg
    - zip
  category: public.app-category.productivity
  # macOS only applies SIGNED + NOTARIZED auto-updates. Sign with the Developer
  # ID (CSC_LINK/CSC_KEY_PASSWORD) and notarize (APPLE_ID/APPLE_APP_SPECIFIC_
  # PASSWORD/APPLE_TEAM_ID) — all provided as env in the release workflow.
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Sign with the "Developer ID Application" cert (MAC_CSC_LINK / MAC_CSC_KEY_
  # PASSWORD secrets) and notarize via notarytool (APPLE_ID / APPLE_APP_SPECIFIC_
  # PASSWORD / APPLE_TEAM_ID passed by the release workflow). Required for
  # Gatekeeper to accept a clean install AND for electron-updater (Squirrel.Mac)
  # to apply auto-updates — an "Apple Development" cert is rejected by both.
  notarize:
    teamId: 7ULADLL579
win:
  target:
    - nsis
linux:
  target:
    - AppImage
  category: Utility
