appId: com.albertmarimon.toolbox
productName: Alberts Toolbox
# Binaries are attached to the GitHub Release by the workflow (softprops action),
# not by electron-builder — disable its publishing so it doesn't try to resolve
# a repo from .git/config (which fails in CI) or embed an auto-update config.
publish: null
directories:
  output: release
  buildResources: build
files:
  - out/**
# Builtin tools ship as resources/tools/<id>/ (built dist + manifest + icon).
extraResources:
  - from: ../../tools
    to: tools
    filter:
      - '**/toolbox.json'
      - '**/icon.svg'
      - '**/dist/**'
mac:
  target:
    - dmg
    - zip
  category: public.app-category.productivity
win:
  target:
    - nsis
linux:
  target:
    - AppImage
  category: Utility
