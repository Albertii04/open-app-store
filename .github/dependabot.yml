version: 2
updates:
  # JS dependencies across the workspace (pnpm).
  - package-ecosystem: npm
    directories:
      - '/'
      - '/apps/desktop'
      - '/apps/tools/*'
      - '/packages/*'
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      # Pinned Electron / Vite build toolchain: major bumps are upgraded
      # deliberately and tested, never auto-PR'd. Minors and patches still flow
      # (grouped below). Bump majors by hand when ready.
      - dependency-name: '*'
        update-types: ['version-update:semver-major']
    groups:
      dev-dependencies:
        dependency-type: development
        update-types: [minor, patch]
      prod-minor-patch:
        dependency-type: production
        update-types: [minor, patch]

  # Keep GitHub Actions pinned versions fresh.
  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
