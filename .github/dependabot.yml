version: 2
updates:
  # JS dependencies across the workspace (pnpm).
  - package-ecosystem: npm
    directories:
      - '/'
      - '/apps/shell'
      - '/packages/*'
      - '/tools/*'
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      # These majors need deliberate, tested upgrades against the
      # electron-vite + vue-tsc stack — handled manually, not by Dependabot.
      - dependency-name: 'electron'
        update-types: ['version-update:semver-major']
      - dependency-name: 'electron-vite'
        update-types: ['version-update:semver-major']
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']
      - dependency-name: '@types/node'
        update-types: ['version-update:semver-major']
    groups:
      dev-dependencies:
        dependency-type: development
        update-types: [minor, patch]
      prod-minor-patch:
        dependency-type: production
        update-types: [minor, patch]

  # Keep GitHub Actions pinned versions fresh.
  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
