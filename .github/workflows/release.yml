name: Release

# Tag a commit on main (e.g. v0.1.0) to build packaged Electron binaries for
# mac / win / linux and attach them to a GitHub Release.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm build

      - name: Package Electron app
        run: pnpm --filter @toolbox/shell package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attach binaries to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/shell/release/*.dmg
            apps/shell/release/*.zip
            apps/shell/release/*.exe
            apps/shell/release/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
